{% extends "base.html" %}
{% load static %}

{% block title %}Your Cart - Petmart India{% endblock %}

{% block main %}

<style>
    :root {
        --petmart-blue: #4A90E2;
        --petmart-blue-dark: #3A7BC8;
        --petmart-blue-light: #7BB0F0;
        --petmart-orange: #FF9F4B;
    }

    .cart-container {
        max-width: 1200px;
        margin: 50px auto;
        padding: 0 20px;
    }
    
    .cart-header {
        text-align: center;
        margin-bottom: 40px;
    }
    
    .cart-header h1 {
        font-family: 'Archivo Black', sans-serif;
        font-size: 2.5rem;
        background: linear-gradient(135deg, var(--petmart-blue), var(--petmart-blue-dark));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 10px;
    }
    
    .cart-header p {
        color: #6c757d;
        font-size: 1.1rem;
    }
    
    .cart-header p i {
        color: var(--petmart-blue);
    }
    
    .cart-wrapper {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 30px;
    }
    
    .cart-items-section {
        background: white;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(74,144,226,0.1);
        border: 1px solid rgba(74,144,226,0.1);
    }
    
    .section-title {
        font-family: 'Archivo Black', sans-serif;
        color: #343a40;
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 2px solid #E6F0FF;
    }
    
    .cart-item {
        display: flex;
        align-items: center;
        padding: 20px 0;
        border-bottom: 1px solid #E6F0FF;
    }
    
    .cart-item:last-child {
        border-bottom: none;
    }
    
    .item-details {
        flex: 1;
    }
    
    .item-name {
        font-family: 'Archivo Black', sans-serif;
        font-size: 1.2rem;
        color: #343a40;
        margin-bottom: 5px;
    }
    
    .item-price {
        color: var(--petmart-blue);
        font-weight: 700;
        font-size: 1.1rem;
    }
    
    .item-actions {
        display: flex;
        align-items: center;
        gap: 20px;
    }
    
    .quantity-control {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #E6F0FF;
        padding: 5px;
        border-radius: 50px;
    }
    
    .quantity-btn {
        width: 35px;
        height: 35px;
        border: none;
        background: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        color: var(--petmart-blue);
    }
    
    .quantity-btn:hover {
        background: linear-gradient(135deg, var(--petmart-blue), var(--petmart-blue-dark));
        color: white;
    }
    
    .quantity-value {
        font-weight: 600;
        min-width: 30px;
        text-align: center;
        color: var(--petmart-blue);
    }
    
    .item-total {
        font-weight: 700;
        color: var(--petmart-blue);
        min-width: 80px;
        text-align: right;
    }
    
    .remove-item {
        color: #dc3545;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 1.2rem;
    }
    
    .remove-item:hover {
        color: var(--petmart-blue);
    }
    
    .order-summary {
        background: white;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(74,144,226,0.1);
        position: sticky;
        top: 100px;
        border: 1px solid rgba(74,144,226,0.1);
    }
    
    .summary-row {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid #E6F0FF;
    }
    
    .summary-row:last-child {
        border-bottom: none;
    }
    
    .summary-label {
        color: #6c757d;
        font-weight: 500;
    }
    
    .summary-value {
        font-weight: 600;
        color: #343a40;
    }
    
    .summary-total {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--petmart-blue), var(--petmart-blue-dark));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 2px solid #E6F0FF;
        display: flex;
        justify-content: space-between;
    }
    
    .promo-section {
        margin: 20px 0;
        padding: 15px 0;
        border-top: 1px dashed #E6F0FF;
        border-bottom: 1px dashed #E6F0FF;
    }
    
    .promo-input {
        display: flex;
        gap: 10px;
        margin-top: 10px;
    }
    
    .promo-input input {
        flex: 1;
        padding: 12px 15px;
        border: 2px solid #E6F0FF;
        border-radius: 50px;
        font-size: 0.95rem;
    }
    
    .promo-input input:focus {
        border-color: var(--petmart-blue);
        outline: none;
        box-shadow: 0 0 0 4px rgba(74,144,226,0.1);
    }
    
    .promo-input button {
        padding: 12px 25px;
        background: linear-gradient(135deg, var(--petmart-blue), var(--petmart-blue-dark));
        color: white;
        border: none;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .promo-input button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(74,144,226,0.3);
    }
    
    .promo-input button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    
    .promo-message {
        margin-top: 10px;
        padding: 10px;
        border-radius: 50px;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 8px;
        animation: slideIn 0.3s ease;
    }
    
    .promo-success {
        background: #d4edda;
        color: #155724;
        border-left: 4px solid #28a745;
    }
    
    .promo-error {
        background: #f8d7da;
        color: #721c24;
        border-left: 4px solid #dc3545;
    }
    
    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .checkout-link {
        display: block;
        width: 100%;
        padding: 18px;
        background: linear-gradient(135deg, var(--petmart-blue), var(--petmart-blue-dark));
        color: white;
        border-radius: 50px;
        font-weight: 700;
        font-size: 1.1rem;
        text-align: center;
        text-decoration: none;
        margin: 20px 0;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .checkout-link:hover {
        background: linear-gradient(135deg, var(--petmart-blue-dark), var(--petmart-blue));
        color: white;
        text-decoration: none;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(74,144,226,0.3);
    }
    
    .continue-shopping {
        display: block;
        text-align: center;
        color: #6c757d;
        text-decoration: none;
        font-weight: 500;
    }
    
    .continue-shopping:hover {
        color: var(--petmart-blue);
        text-decoration: none;
    }
    
    .empty-cart {
        text-align: center;
        padding: 60px 20px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(74,144,226,0.1);
    }
    
    .empty-cart-icon {
        font-size: 5rem;
        color: #E6F0FF;
        margin-bottom: 20px;
    }
    
    .empty-cart h3 {
        font-family: 'Archivo Black', sans-serif;
        color: #343a40;
        margin-bottom: 15px;
    }
    
    .shop-now-btn {
        display: inline-block;
        background: linear-gradient(135deg, var(--petmart-blue), var(--petmart-blue-dark));
        color: white;
        padding: 15px 40px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }
    
    .shop-now-btn:hover {
        background: linear-gradient(135deg, var(--petmart-blue-dark), var(--petmart-blue));
        color: white;
        text-decoration: none;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(74,144,226,0.3);
    }
    
    .delivery-info {
        background: #E6F0FF;
        padding: 15px;
        border-radius: 10px;
        margin: 15px 0;
        color: #666;
    }
    
    .delivery-info i {
        color: var(--petmart-blue);
        margin-right: 10px;
    }
    
    .delivery-info strong {
        color: var(--petmart-blue);
    }
    
    .discount-row {
        color: #28a745;
        font-weight: 600;
    }
    
    .applied-promo {
        background: #E6F0FF;
        padding: 10px;
        border-radius: 50px;
        margin: 10px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .applied-promo i {
        color: var(--petmart-blue);
    }
    
    .remove-promo {
        color: #dc3545;
        cursor: pointer;
        font-size: 0.9rem;
    }
    
    .remove-promo:hover {
        text-decoration: underline;
    }
    
    .text-success {
        color: #28a745 !important;
    }
</style>

<section class="cart-section">
    <div class="container">
        <div class="cart-container">
            <div class="cart-header">
                <h1>Your Shopping Cart</h1>
                <p><i class="bi bi-bag-heart"></i> Review your items before checkout</p>
            </div>
            
            <!-- Cart Items Container -->
            <div id="cartContent">
                <!-- Cart will be loaded dynamically -->
            </div>
        </div>
    </div>
</section>

<script>
// Cart management
let cart = [];
let appliedPromo = null;
let promoDiscount = 0;

// Valid promo codes for Petmart
const PROMO_CODES = {
    'PET50': { discount: 50, type: 'percent', max: 100, description: '50% off' },
    'PETFREE': { discount: 40, type: 'fixed', description: 'Free Delivery' },
    'WELCOME20': { discount: 20, type: 'percent', max: 50, description: '20% off' },
    'SAVE50': { discount: 50, type: 'fixed', description: '₹50 Off' },
    'PETLOVE': { discount: 15, type: 'percent', max: 100, description: '15% off' }
};

// Check if order was just placed
(function() {
    // Check sessionStorage for order placed flag
    const orderPlaced = sessionStorage.getItem('order_placed');
    if (orderPlaced === 'true') {
        // Clear cart
        localStorage.removeItem('cart');
        sessionStorage.removeItem('order_placed');
        sessionStorage.removeItem('checkout_cart');
        sessionStorage.removeItem('applied_promo');
        console.log('Cart cleared after order completion');
    }
    
    // Check URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('order') === 'placed') {
        localStorage.removeItem('cart');
        sessionStorage.removeItem('checkout_cart');
        sessionStorage.removeItem('applied_promo');
    }
    
    // Load any saved promo
    const savedPromo = sessionStorage.getItem('applied_promo');
    if (savedPromo) {
        try {
            appliedPromo = JSON.parse(savedPromo);
        } catch(e) {
            appliedPromo = null;
        }
    }
})();

// Load cart on page start
try {
    const savedCart = localStorage.getItem('cart');
    if (savedCart) {
        cart = JSON.parse(savedCart);
        console.log('Cart loaded:', cart);
    } else {
        cart = [];
        console.log('Empty cart');
    }
} catch(e) {
    console.log('Error loading cart:', e);
    cart = [];
}

function displayCart() {
    const cartContent = document.getElementById('cartContent');
    
    if (!cart || cart.length === 0) {
        cartContent.innerHTML = `
            <div class="empty-cart">
                <div class="empty-cart-icon">
                    <i class="bi bi-cart-x"></i>
                </div>
                <h3>Your cart is empty</h3>
                <p>Looks like you haven't added any items yet.</p>
                <a href="{% url 'menu' %}" class="shop-now-btn">
                    <i class="bi bi-bag-heart"></i> Browse Products
                </a>
            </div>
        `;
        return;
    }
    
    let subtotal = 0;
    let itemsHtml = '';
    
    for(let i = 0; i < cart.length; i++) {
        const item = cart[i];
        const quantity = item.quantity || 1;
        const itemTotal = item.price * quantity;
        subtotal += itemTotal;
        
        itemsHtml += `
            <div class="cart-item">
                <div class="item-details">
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">₹${item.price}</div>
                </div>
                <div class="item-actions">
                    <div class="quantity-control">
                        <button class="quantity-btn" onclick="changeQuantity(${i}, -1)">−</button>
                        <span class="quantity-value">${quantity}</span>
                        <button class="quantity-btn" onclick="changeQuantity(${i}, 1)">+</button>
                    </div>
                    <div class="item-total">₹${itemTotal}</div>
                    <div class="remove-item" onclick="removeItem(${i})">
                        <i class="bi bi-trash"></i>
                    </div>
                </div>
            </div>
        `;
    }
    
    // Calculate totals with promo
    const tax = Math.round(subtotal * 0.05);
    const delivery = 40;
    let discount = 0;
    let promoHtml = '';
    
    if (appliedPromo) {
        if (appliedPromo.type === 'percent') {
            discount = Math.min(subtotal * appliedPromo.discount / 100, appliedPromo.max || Infinity);
        } else {
            discount = appliedPromo.discount;
        }
        discount = Math.round(discount);
        
        promoHtml = `
            <div class="applied-promo">
                <span><i class="bi bi-tags-fill"></i> ${appliedPromo.code} applied - ${appliedPromo.description}</span>
                <span class="remove-promo" onclick="removePromo()">Remove</span>
            </div>
        `;
    }
    
    const finalDelivery = subtotal >= 499 ? 0 : delivery;
    const total = subtotal + tax + finalDelivery - discount;
    
    cartContent.innerHTML = `
        <div class="cart-wrapper">
            <div class="cart-items-section">
                <h2 class="section-title">Your Cart Items (${cart.length})</h2>
                ${itemsHtml}
                
                <div class="delivery-info">
                    <i class="bi bi-truck"></i> 
                    <strong>Delivery Information:</strong> Free delivery on orders above ₹499
                    ${subtotal >= 499 ? '<span class="text-success ms-2">✓ Eligible for free delivery</span>' : ''}
                </div>
            </div>
            
            <div class="order-summary">
                <h2 class="section-title">Order Summary</h2>
                
                ${itemsHtml.split('<div class="cart-item">').slice(1).map(item => {
                    const nameMatch = item.match(/item-name">(.*?)</);
                    const qtyMatch = item.match(/quantity-value">(\d+)</);
                    const priceMatch = item.match(/item-total">₹(\d+)</);
                    
                    if(nameMatch && qtyMatch && priceMatch) {
                        return `
                            <div class="summary-row">
                                <span class="summary-label">${nameMatch[1]} x ${qtyMatch[1]}</span>
                                <span class="summary-value">₹${priceMatch[1]}</span>
                            </div>
                        `;
                    }
                    return '';
                }).join('')}
                
                <div class="summary-row">
                    <span class="summary-label">Subtotal</span>
                    <span class="summary-value">₹${subtotal}</span>
                </div>
                
                <div class="summary-row">
                    <span class="summary-label">Delivery Fee</span>
                    <span class="summary-value ${subtotal >= 499 ? 'text-success' : ''}">
                        ${subtotal >= 499 ? 'FREE' : '₹' + delivery}
                    </span>
                </div>
                
                <div class="summary-row">
                    <span class="summary-label">Tax (GST)</span>
                    <span class="summary-value">₹${tax}</span>
                </div>
                
                ${discount > 0 ? `
                    <div class="summary-row discount-row">
                        <span class="summary-label">Discount</span>
                        <span class="summary-value">-₹${discount}</span>
                    </div>
                ` : ''}
                
                <div class="promo-section">
                    <div class="summary-label">Have a promo code?</div>
                    <div class="promo-input">
                        <input type="text" id="promoCode" placeholder="Enter code" value="${appliedPromo ? appliedPromo.code : ''}" ${appliedPromo ? 'disabled' : ''}>
                        <button onclick="applyPromo()" ${appliedPromo ? 'disabled' : ''}>Apply</button>
                    </div>
                    <div id="promoMessage"></div>
                    ${promoHtml}
                </div>
                
                <div class="summary-total">
                    <span>Total</span>
                    <span>₹${total}</span>
                </div>
                
                <a href="/checkout/" class="checkout-link" onclick="return saveCartForCheckout()">
                    <i class="bi bi-lock-fill"></i> Proceed to Checkout
                </a>
                
                <a href="{% url 'menu' %}" class="continue-shopping">
                    <i class="bi bi-arrow-left"></i> Continue Shopping
                </a>
            </div>
        </div>
    `;
    
    // Update cart count in navbar
    updateCartCount();
}

function applyPromo() {
    const promoInput = document.getElementById('promoCode');
    const promoMessage = document.getElementById('promoMessage');
    const code = promoInput.value.trim().toUpperCase();
    
    if (!code) {
        showPromoMessage('Please enter a promo code', 'error');
        return;
    }
    
    if (PROMO_CODES[code]) {
        const promo = PROMO_CODES[code];
        appliedPromo = {
            code: code,
            discount: promo.discount,
            type: promo.type,
            max: promo.max,
            description: promo.description || `${promo.discount}${promo.type === 'percent' ? '%' : '₹'} off`
        };
        
        // Save to session
        sessionStorage.setItem('applied_promo', JSON.stringify(appliedPromo));
        
        showPromoMessage(`Promo code ${code} applied! You saved ${promo.description || ''}`, 'success');
        displayCart(); // Refresh cart
    } else {
        showPromoMessage('Invalid promo code', 'error');
    }
}

function removePromo() {
    appliedPromo = null;
    sessionStorage.removeItem('applied_promo');
    displayCart();
    showPromoMessage('Promo code removed', 'success');
}

function showPromoMessage(message, type) {
    const promoMessage = document.getElementById('promoMessage');
    promoMessage.innerHTML = `
        <div class="promo-message promo-${type}">
            <i class="bi ${type === 'success' ? 'bi-check-circle' : 'bi-exclamation-circle'}"></i>
            ${message}
        </div>
    `;
    
    setTimeout(() => {
        promoMessage.innerHTML = '';
    }, 3000);
}

function saveCartForCheckout() {
    if (!cart || cart.length === 0) {
        alert('Your cart is empty!');
        return false;
    }
    
    // Save current cart to localStorage
    localStorage.setItem('cart', JSON.stringify(cart));
    
    // Save promo if applied
    if (appliedPromo) {
        sessionStorage.setItem('applied_promo', JSON.stringify(appliedPromo));
    }
    
    console.log('Cart saved for checkout:', cart);
    return true; // Allow the link to work
}

function changeQuantity(index, change) {
    if(cart[index]) {
        cart[index].quantity = (cart[index].quantity || 1) + change;
        
        if(cart[index].quantity < 1) {
            cart.splice(index, 1);
        }
        
        localStorage.setItem('cart', JSON.stringify(cart));
        displayCart();
    }
}

function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    displayCart();
}

function updateCartCount() {
    const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
    document.querySelectorAll('.cart-count').forEach(el => {
        if(el) el.textContent = count;
    });
}

// Start the page
displayCart();

// Listen for storage events (if cart updated in another tab)
window.addEventListener('storage', function(e) {
    if (e.key === 'cart') {
        try {
            cart = JSON.parse(e.newValue) || [];
            displayCart();
        } catch(e) {
            console.log('Error parsing cart from storage event');
        }
    }
});

// Check if we came from a successful order
document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('order') === 'placed') {
        // Show a success message if needed
        const cartContent = document.getElementById('cartContent');
        if (cartContent) {
            // Cart is already cleared by the IIFE above
            console.log('Order completed, cart cleared');
        }
    }
});
</script>

{% endblock %}
